<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>霧峰區公所 - 檔案應用有獎徵答</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f8ff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 15px;
            box-sizing: border-box;
        }
        #game-container {
            background-color: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 100%;
            text-align: center;
            position: relative;
            overflow: hidden;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        h1 { color: #0056b3; font-size: 26px; margin-bottom: 10px; }
        h2 { color: #0056b3; margin-top: 0; font-size: 22px;}
        p { color: #555; font-size: 16px; line-height: 1.6; }

        .primary-btn {
            background-color: #0056b3;
            color: white;
            padding: 15px 20px;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            width: 85%;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: transform 0.2s, background-color 0.2s;
        }
        .primary-btn:active { transform: scale(0.95); background-color: #004494; }

        /* 載入中狀態的按鈕樣式 */
        .loading-btn {
            background-color: #ccc !important;
            cursor: not-allowed;
        }

        .option-btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 12px 0;
            background-color: #e9ecef;
            border: 2px solid #dee2e6;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            color: #333;
            cursor: pointer;
            transition: 0.2s;
        }
        .option-btn:active { background-color: #0056b3; color: white; border-color: #0056b3; }

        #question-text {
            font-size: 22px;
            font-weight: bold;
            color: #333;
            margin-bottom: 25px;
            line-height: 1.4;
            min-height: 60px; 
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .screen { display: none; }
        .active { display: block; animation: fadeIn 0.5s; }

        .success-text { color: #28a745; font-size: 28px; font-weight: bold; margin-bottom: 15px;}
        .fail-text { color: #dc3545; font-size: 28px; font-weight: bold; margin-bottom: 15px;}

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div id="game-container">
    
    <div id="home-screen" class="screen active">
        <h1>📂 霧峰區公所<br>檔案應用有獎徵答</h1>
        <div style="font-size: 60px; margin: 20px 0;">🏫</div>
        <p>準備好接受挑戰了嗎？</p>
        <p style="font-size: 14px; color: #666;">隨機抽出 1 題，答對即可抽獎！</p>
        <button class="primary-btn" onclick="goToGame()">🚀 開始挑戰</button>
    </div>

    <div id="question-screen" class="screen">
        <h2>❓ 請回答下列問題</h2>
        <div id="question-text">題目載入中...</div>
        <div id="options-container"></div>
    </div>

    <div id="success-screen" class="screen">
        <div style="font-size: 60px; margin-bottom: 10px;">🎉</div>
        <div class="success-text">恭喜答對！</div>
        <p style="font-size: 18px; font-weight: bold;">太厲害了！完全了解規定。</p>
        <button id="draw-btn" class="primary-btn" onclick="drawPrize()" style="background-color: #ff9800;">🎁 點擊抽獎</button>
    </div>

    <div id="prize-screen" class="screen">
        <div style="font-size: 60px; margin-bottom: 10px;">🎁</div>
        <div class="success-text">您的禮物代碼</div>
        <div id="prize-code" style="font-size: 80px; color: #d32f2f; font-weight: bold; margin: 10px 0;">?</div>
        <div style="background-color: #fff3cd; color: #856404; padding: 15px; border-radius: 10px; margin-top: 15px;">
            👉 <b>請出示此畫面給工作人員</b><br>兌換桌上對應編號的小禮物！<br>
            <span style="font-size: 14px; color: #666;">(兌換完畢後請直接關閉此網頁)</span>
        </div>
    </div>

    <div id="fail-screen" class="screen">
        <div style="font-size: 60px; margin-bottom: 10px;">❌</div>
        <div class="fail-text">哎呀，答錯了！</div>
        <p style="font-size: 18px;">沒關係，規定細節很多。<br>要不要再試一次？</p>
        <button class="primary-btn" onclick="retryGame()">↻ 再抽一題</button>
    </div>

</div>

<script>
    // ==========================================
    // 🔗 雲端抽獎系統連線設定 (已替換為專屬網址)
    // ==========================================
    const API_URL = "https://script.google.com/macros/s/AKfycbw5Bf5D0QpbV_iSaHaSj1V5ArEPF2TjnvU5mbCAMJQ0uHlyymo9DBPR_0bQBHAzIT7a/exec";
    
    // 頁面切換邏輯
    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    // 題庫資料
    const questions = [
        { q: "想向機關申請閱覽檔案，<br>需要填寫什麼文件？", options: ["閱卷申請書", "檔案應用申請書", "不用寫，打電話申請就好"], ans: 1 },
        { q: "下列何者是霧峰區公所的<br>檔案應用開放時間？", options: ["星期一至星期五", "國定假日", "例假日"], ans: 0 },
        { q: "民眾申請檔案應用，機關最晚<br>應於受理後幾日內通知？", options: ["30日", "60日", "90日"], ans: 0 },
        { q: "檔案法所稱的「檔案」，<br>是指下列哪一種資料？", options: ["民眾私下的筆記", "機關收發、保存之資料", "報章雜誌"], ans: 1 },
        { q: "複製檔案以黑白複印時，<br>B4(含)尺寸以下每張幾元？", options: ["10元", "5元", "2元"], ans: 2 },
        { q: "「機關檔案目錄查詢網」的<br>英文名稱縮寫為何?", options: ["NASA", "NEAR", "GOOGLE"], ans: 1 },
        { q: "閱覽、抄錄檔案，<br>其收費標準為何？", options: ["免費", "每 2 小時 20 元", "一次 100 元"], ans: 1 },
        { q: "複製檔案以黑白複印時，<br>A3尺寸每張幾元？", options: ["10元", "5元", "3元"], ans: 2 },
        { q: "檔案應用之方式，<br>不包括下列何者？", options: ["閱覽", "抄錄", "把檔案借回家"], ans: 2 },
        { q: "利用機關檔案目錄查詢網「NEAR」主要是查詢什麼資訊？", options: ["檔案的內容", "檔案目錄", "檔案承辦人的姓名"], ans: 1 },
        { q: "要遞送「檔案應用申請書」，<br>可以透過下列哪種方式？", options: ["親自到現場送件", "透過郵寄方式送件", "以上皆可"], ans: 2 },
        { q: "機關通知須「補正」資料時，<br>應於收到通知後幾日內補正？", options: ["7 日內", "14 日內", "30 日內"], ans: 0 },
    ];
    
    let currentQuestion = {};

    // ==========================================
    // 🧠 題庫記憶功能 (確保單一裝置不重複抽題)
    // ==========================================
    function getAvailableQuestions() {
        let pool = localStorage.getItem('wufengQuestionPool');
        if (pool) {
            pool = JSON.parse(pool);
            if (pool.length === 0) {
                pool = Array.from({length: questions.length}, (_, i) => i);
            }
        } else {
            pool = Array.from({length: questions.length}, (_, i) => i);
        }
        return pool;
    }

    function saveAvailableQuestions(pool) {
        localStorage.setItem('wufengQuestionPool', JSON.stringify(pool));
    }

    function goToGame() {
        startGame();
        showScreen('question-screen');
    }

    function retryGame() {
        startGame();
        showScreen('question-screen');
    }

    function startGame() {
        // 取得目前剩下的題庫池
        let pool = getAvailableQuestions();
        
        // 從剩下的題目中隨機挑選
        let randomPoolIndex = Math.floor(Math.random() * pool.length);
        let questionIndex = pool[randomPoolIndex]; 
        
        // 剔除已被抽中的題目並存檔
        pool.splice(randomPoolIndex, 1);
        saveAvailableQuestions(pool);

        currentQuestion = questions[questionIndex];

        document.getElementById('question-text').innerHTML = currentQuestion.q;
        
        const optionsContainer = document.getElementById('options-container');
        optionsContainer.innerHTML = ''; 
        
        currentQuestion.options.forEach((option, index) => {
            let btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerHTML = option;
            btn.onclick = () => checkAnswer(index);
            optionsContainer.appendChild(btn);
        });
    }

    function checkAnswer(selectedIndex) {
        if (selectedIndex === currentQuestion.ans) {
            showScreen('success-screen'); 
        } else {
            showScreen('fail-screen');    
        }
    }

    // ==========================================
    // ☁️ 雲端抽獎邏輯 (串接 Google Sheets)
    // ==========================================
    function drawPrize() {
        let btn = document.getElementById('draw-btn');
        
        // 為了防止民眾連續點擊，先把按鈕變成「載入中」狀態
        btn.innerText = "⏳ 連線抽獎中...";
        btn.classList.add('loading-btn');
        btn.disabled = true;

        // 向 Google 試算表發送請求
        fetch(API_URL)
            .then(response => response.json())
            .then(data => {
                // 收到結果，恢復按鈕狀態
                btn.innerText = "🎁 點擊抽獎";
                btn.classList.remove('loading-btn');
                btn.disabled = false;

                if (data.status === "success") {
                    // 抽獎成功，顯示代碼
                    document.getElementById('prize-code').innerText = data.code;
                    showScreen('prize-screen');
                } else if (data.status === "empty") {
                    // 籤筒已空
                    alert("哎呀！所有獎品已經全部被抽完囉！請洽詢現場人員。");
                } else {
                    // 發生錯誤
                    alert("系統訊息：" + data.message);
                }
            })
            .catch(error => {
                // 網路斷線或其他錯誤
                btn.innerText = "🎁 點擊抽獎";
                btn.classList.remove('loading-btn');
                btn.disabled = false;
                alert("網路連線異常，請確認手機網路狀態後再試一次！");
                console.error('Error:', error);
            });
    }
</script>

</body>
</html>
